  - type: ChangelingAction
    chemicalCost: 20 # It's the weakest one of the stimulants, so it can be cheaper.
    useInLesserForm: true

- type: entity
  id: ActionDesoxyephedrineOverdose
  name: Desoxyephedrine Overdose
  description: Inject some stronger stimulants into yourself, poisoning yourself mildly. Costs 30 chemicals.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 20
    itemIconStyle: NoItem
    icon:
      sprite: _Starlight/Actions/changeling.rsi
      state: desoxyephedrine_overdose
    checkCanInteract: false
  - type: InstantAction
    event: !type:ActionDesoxyephedrineOverdoseEvent {}
  - type: ChangelingAction
    chemicalCost: 30 # It injects enough Desoxy to hurt you, so it doesn't need to be that more expensive.
    requireAbsorbed: 2 # It's not that great... but it's a faster stimulant than Ephedrine, so it requires you to have absorbed a bit more.
    useInLesserForm: true

