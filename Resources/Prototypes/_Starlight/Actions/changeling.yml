# abilities

# starting
- type: entity
  id: ActionEvolutionMenu
  name: Open evolution menu
  description: Opens the evolution menu. Can be used while unconscious.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Changeling/changeling_abilities.rsi
      state: evolution_menu
    checkCanInteract: false # Let them shop while cuffed/unconscious. Could be neat.
    checkConsciousness: false
  - type: InstantAction
    event: !type:OpenEvolutionMenuEvent {}
  - type: ChangelingAction
    requireBiomass: false
    useInLesserForm: true

- type: entity
  id: ActionStingExtractDNA
  name: Extract DNA sting
  description: Steal your target's genetic information. Costs 25 chemicals.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Changeling/changeling_abilities.rsi
      state: sting_extractdna
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - Body
    canTargetSelf: false
    event: !type:StingExtractDNAEvent {}
  - type: ChangelingAction
    chemicalCost: 25
    useInLesserForm: true
  - type: EorgPreventAction


- type: entity
  id: ActionEnterStasis
  name: Enter regenerative stasis
  description: Fake your death and start regenerating. Drains all your chemicals. Consumes biomass.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 5
    itemIconStyle: NoItem
    icon:
      sprite: Changeling/changeling_abilities.rsi
      state: stasis_enter
    checkCanInteract: false
    checkConsciousness: false
  - type: InstantAction
    event: !type:EnterStasisEvent {}
  - type: ChangelingAction
    biomassCost: 1
    useInLesserForm: true

- type: entity
  id: ActionExitStasis
  name: Exit stasis
  description: Rise from the dead with full health. Costs 60 chemicals.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 5
    itemIconStyle: NoItem
    icon:
      sprite: Changeling/changeling_abilities.rsi
      state: stasis_exit
    checkCanInteract: false
    checkConsciousness: false
  - type: InstantAction
    event: !type:ExitStasisEvent {}
  - type: ChangelingAction
    chemicalCost: 60
    useInLesserForm: true

# combat
- type: entity
  parent: BaseAction
  id: ActionRetractableItemArmBladePlus
  name: True Arm Blade
  description: Shed your flesh and reform it into a truly beautiful blade. Costs 30 chemicals to summon, and 30 chemicals to retract.
  components:
  - type: Action
    useDelay: 2
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _Starlight/Interface/Actions/actions_changeling.rsi
      state: armblade-plus
  - type: InstantAction
    event: !type:OnRetractableItemActionEvent
  - type: RetractableItemAction
    spawnedPrototype: ArmBladePlus
    summonSounds:
      collection: gib # Placeholder
    retractSounds:
      collection: gib # Placeholder
  - type: ChangelingAction
    chemicalCost: 30 # It's *very* strong. This is your *final* upgrade.
    requireAbsorbed: 6

