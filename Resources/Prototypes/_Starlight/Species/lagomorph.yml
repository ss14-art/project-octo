- type: species
  id: Lagomorph
  name: species-name-lagomorph
  roundStart: true
  prototype: MobLagomorph
  sprites: MobLagomorphSprites
  markingLimits: MobLagomorphMarkingLimits
  dollPrototype: AppearanceLagomorph
  skinColoration: Hues
  customName: true
  minAge: 22
  youngAge: 25
  oldAge: 70
  maxAge: 80
  minWidth: 0.8
  defaultWidth: 1
  maxWidth: 1.2
  minHeight: 0.8
  defaultHeight: 1
  maxHeight: 1.2
  standardSize: 150
  standardWeight: 40
  standardDensity: 17

- type: speciesBaseSprites
