# Starlight - Base inventory entities for species
# Used by both Appearance and Mob entities to avoid duplication of displacement maps

# Shared female jumpsuit displacement used by many humanoid species
- type: entity
  id: BaseInventoryFemaleJumpsuit
  abstract: true
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

