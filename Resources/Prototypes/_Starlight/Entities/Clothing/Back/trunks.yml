- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackTrunk
  name: trunk
  description: A large and heavy trunk for holding even more things.
  abstract: true
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,11,3
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.85
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 9
    soundHit:
      collection: MetalThud
  - type: HeldSpeedModifier

- type: entity
  parent: ClothingBackpackTrunk
  id: ClothingBackpackTrunkMail
  name: mail trunk
  description: A huge trunk made of every aspiring mail technician's dreams.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Back/Trunks/mailtrunk.rsi

- type: entity
  parent: ClothingBackpackTrunk
  id: ClothingBackpackTrunkMailSenior
  name: senior mail trunk
  description: A huge trunk for the station's strongest mail technicians.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Back/Trunks/mailseniortrunk.rsi

- type: entity
  parent: [ClothingBackpackTrunk, BaseMinorContraband]
  id: ClothingBackpackTrunkSyndicate
  name: syndicate trunk
  description: Huge, metal, and stylish. All the other syndicates will want to get their hands on this trunk.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Back/Trunks/syndicate.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: Storage
    grid:
    - 0,0,12,3
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 15
    soundHit:
      collection: MetalThud

# Fashion-O-Mat
- type: entity
  parent: ClothingBackpackTrunk
  id: ClothingBackpackTrunkSpaceCourier
  name: space courier trunk
  description: A huge trunk themed after a legendary space courier.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Back/Trunks/space_courier_trunk.rsi

- type: entity
  parent: ClothingBackpackTrunkSpaceCourier
  id: ClothingBackpackTrunkSpaceCourierPAI
  name: space courier trunk
  suffix: Ghost Role
  description: A huge trunk themed after a legendary space courier.
  components:
  - type: GhostRole
    makeSentient: true
    name: ghost-role-information-space-courier-trunk-name
    description: ghost-role-information-space-courier-trunk-description
    rules: ghost-role-information-space-courier-trunk-rules
    mindRoles:
    - MindRoleGhostRoleTrunkPAI
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: MovementSpeedModifier
