  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Back/Backpacks/command.rsi

- type: entity
  parent: [ClothingBackpack, BaseBlueShieldContraband]
  id: ClothingBackpackBlueShield
  name: blueshield backpack
