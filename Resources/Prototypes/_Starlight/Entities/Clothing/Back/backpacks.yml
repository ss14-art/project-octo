- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackRoboticist
  name: roboticist backpack
  description: A backpack specifically designed for oil and short circuit protection.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/roboticist.rsi

- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackCargoSenior
  name: senior courier backpack
  description: A robust backpack for those who know the station's map by heart.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/cargosenior.rsi

- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackChemistrySenior
  name: senior chemistry backpack
  description: A specially designed backpack that will never be stained, no matter what liquids are spilled on it.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/chemistrysenior.rsi

- type: entity
  parent: [ClothingBackpack, BaseSecurityContraband]
  id: ClothingBackpackCorpsman
  name: corpsman's backpack
  description: A backpack with easy to access pockets for the organized corpsman!
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/corpsman.rsi

- type: entity
  parent: [ClothingBackpack, BaseCommandContraband]
