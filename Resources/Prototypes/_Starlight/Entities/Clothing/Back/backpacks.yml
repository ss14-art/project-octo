  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/tsf.rsi

- type: entity
  parent: [ ClothingBackpack, BaseMagicalContraband ]
  id: ClothingBackpackWizard
  name: wizard backpack
  description: A magical backpack carried by members of the Space Wizards Federation.
