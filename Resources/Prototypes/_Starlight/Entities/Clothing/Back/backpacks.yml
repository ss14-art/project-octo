  id: ClothingBackpackNTNC
  name: NTNC backpack
  description: A spacious backpack with lots of pockets, worn by NTNC Officers
  components:
    - type: ExplosionResistance
      damageCoefficient: 0.1
    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/ntnc_bag.rsi

- type: entity
  parent: [BaseTSFContraband, ClothingBackpackERTLeader]
  id: ClothingBackpackTSF
