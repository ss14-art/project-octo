    - type: Sprite
      sprite: _Starlight/Clothing/Back/Backpacks/wizard.rsi
    - type: ExplosionResistance
      damageCoefficient: 0.1
    - type: Storage
      grid:
      - 0,0,8,4

- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackBunnyGang
