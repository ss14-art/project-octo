- type: entity
  parent: [ClothingNeckBase, BaseSyndicateContraband]
  id: ClothingNeckExplosiveCollar
  name: explosive collar
  description: The legally distinct reverse beartrap from a certin movie franchise
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Neck/Misc/explosivecollar.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Neck/Misc/explosivecollar.rsi
    stripDelay: 10
    equipDelay: 5
  - type: SelfUnremovableClothing
  - type: AmputatateOnTrigger
    targetContainer: true
    parts:
    - HeadHuman
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    # Cosmetic explosion :tf:
    maxIntensity: 0.01
    intensitySlope: 1
    totalIntensity: 0.01
  - type: TriggerOnSignal
  - type: DeviceLinkSink
    ports:
      - Trigger

- type: entity
  parent: [ClothingNeckBase, BaseTSFContraband]
  id: ClothingNeckTSFBadge
  name: TSF badge
  description: An official badge from the Trans Solar Federation. This polished piece of law enforcement equipment bears the distinctive TSF eagle emblem, a symbol of authority recognized across known space.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Neck/Misc/tsf_badge.rsi
    state: icon
  - type: Clothing
    sprite: _Starlight/Clothing/Neck/Misc/tsf_badge.rsi
  - type: Item
    size: Tiny

- type: entity
  parent: ClothingScarfBase
  id: ClothingNeckBunnyGang
  name: Bunny Gang Scarf
  description: The scarf of a secretive group of bunny mercenaries.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Neck/Misc/bunnygang.rsi
      state: icon
    - type: Clothing
      sprite: _Starlight/Clothing/Neck/Misc/bunnygang.rsi
