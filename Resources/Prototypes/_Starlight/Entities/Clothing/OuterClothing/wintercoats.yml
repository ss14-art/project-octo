# Medical
- type: entity
  parent: ClothingOuterWinterCoatToggleable
  id: ClothingOuterWinterChemSenior
  name: senior chemistry winter coat
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/WinterCoats/coat.rsi
    layers:
    - state: CHEM-SENIOR-icon
  - type: Item
    inhandVisuals:
      left:
      - state: CHEM-SENIOR-inhand-left
      right:
      - state: CHEM-SENIOR-inhand-right
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/WinterCoats/coat.rsi
    clothingVisuals:
      outerClothing:
      - state: CHEM-SENIOR-equipped-OUTERCLOTHING
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.95
        Heat: 0.90
        Caustic: 0.75
    priceMultiplier: 0.15
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodWinterChemSenior

