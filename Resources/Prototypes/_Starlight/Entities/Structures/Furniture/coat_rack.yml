- type: entity
  name: coat rack
  id: FurnitureCoatRack
  parent: BaseStructure
  description: Holds your coat or hat, and is always mistaken for a person in the dark.
  components:
  - type: Rotatable
  - type: Anchorable
    delay: 1
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/coat_rack.rsi
    state: coat_rack
    noRot: true
  - type: Appearance
  - type: Transform
    anchored: true
    noRot: false
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 100
        mask:
        - TableMask
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 1
  - type: Tag
    tags:
    - Wooden

- type: entity
  name: wooden rack
  id: FurnitureWoodRack
  parent: FurnitureCoatRack
  description: A wooden rack for storing things.
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/woodrack.rsi
    state: woodrack
    noRot: true

