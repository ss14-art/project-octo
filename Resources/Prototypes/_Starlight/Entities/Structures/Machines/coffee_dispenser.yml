- type: entity
  parent: ReagentDispenserBasePowerCell # Starlight edit: power cell soda dispenser
  id: CoffeeDispenserEmpty
  name: coffee dispenser
  description: A beverage dispenser with a selection of coffee and tea. Has a single fill slot for containers.
  suffix: Empty
  components:
  - type: Rotatable
  - type: Sprite
    sprite: _Starlight/Structures/coffee_machine.rsi
    drawdepth: SmallObjects
    state: coffee_machine
  - type: Storage
    openOnActivate: false
    whitelist:
      tags:
      - DrinkBottle
  - type: Transform
    noRot: false
  - type: Machine
    board: CoffeeDispenserMachineCircuitboard
  - type: GuideHelp
    guides:
    - Bartender
    - Drinks
  # Starlight start: Power Cell Soda dispenser
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
        #Starlight Start
        blacklist:
          tags:
          - MechReactor
        #Starlight End
  # Starlight end

- type: entity
  parent: CoffeeDispenserEmpty
  id: CoffeeDispenser
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: DrinkCoffeeJug
        - id: DrinkCreamCartonXL
        - id: DrinkGreenTeaJug
        - id: DrinkIceJug
        - id: DrinkSugarJug
        - id: DrinkTeaJug
        - id: DrinkCoffeeLiqueurBottleFull
