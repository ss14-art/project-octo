#shuttle walls
- type: entity
  id: WallAbductorDiagonal
  name: shuttle wall
  suffix: Diagonal
  description: Keeps the air in and the assistants out.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Tag
    tags:
    - Wall
  - type: Sprite
    drawdepth: Walls
    sprite: _Starlight/Structures/Walls/abductor_diagonal.rsi
    state: state0
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state
  - type: Icon
    sprite: _Starlight/Structures/Walls/abductor_diagonal.rsi
    state: state0
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Physics
    bodyType: Static
  - type: Reflect
    reflects: Energy
    reflectProb: 1
  - type: Ricochetable
    chance: 1
  - type: Pullable
  - type: Airtight
    noAirWhenFullyAirBlocked: false
    airBlockedDirection:
    - South
    - East
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.5,0.5"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: Construction
    graph: Girder
    node: diagonalshuttleWall

- type: entity
  parent: BaseWall
  id: WallAbductor
  name: shuttle wall
  suffix: Reinforced, Exterior
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: StaticPrice
    price: 250
  - type: RadiationBlocker
    resistance: 5
  - type: Sprite
    sprite: _Starlight/Structures/Walls/abductor.rsi
  - type: Icon
    sprite: _Starlight/Structures/Walls/abductor.rsi
    state: full
  - type: Construction
    graph: Girder
    node: shuttleWall
  - type: IconSmooth
    key: walls
    base: state
  - type: Appearance
  - type: Ricochetable
    chance: 1

- type: entity
  parent: BaseWall
  id: WallConcrete
  name: concrete wall
  suffix: Reinforced
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Sprite
    sprite: _Starlight/Structures/Walls/concrete_wall.rsi
  - type: Icon
    sprite: _Starlight/Structures/Walls/concrete_wall.rsi
    state: full
  - type: IconSmooth
    key: walls
    base: state
  - type: Appearance
  - type: Pierceable
    level: Rock
  - type: Ricochetable
    chance: 0.75
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Girder:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# Xenoborg
- type: entity
  parent: WallSolid
  id: WallXenoborgRCD
  name: light xenoborg wall
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Walls/xenoborglight.rsi
  - type: Icon
    sprite: _Starlight/Structures/Walls/xenoborglight.rsi
  - type: IconSmooth
    key: walls
    base: xenoborglight

- type: entity
  parent: WallWood
  id: WallDarkWood
  name: dark wood wall
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Walls/gray_wood.rsi
    color: "#795382"
  - type: Icon
    sprite: _Starlight/Structures/Walls/gray_wood.rsi

# Starlight start - reinforced plastitanium/shuttle wall variants
# Workaround: instead of buffing base wall HP (which cascades into xenoborg walls),
# these are separate high-HP variants intended for shuttle/naval combat scenarios.

# Reinforced Plastitanium Walls (2x HP: 1000 → 2000)

- type: entity
  parent: WallPlastitanium
  id: WallReinforcedPlastitanium
  name: reinforced plastitanium wall
  suffix: reinforced
  description: A plastitanium wall reinforced with an additional structural lattice, doubling its resistance to damage.
  components:
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 2000
          behaviors:
            - !type:SpawnEntitiesBehavior
              spawn:
                Girder:
                  min: 1
                  max: 1
            - !type:DoActsBehavior
              acts: [ "Destruction" ]

- type: entity
  parent: WallPlastitaniumDiagonal
  id: WallReinforcedPlastitaniumDiagonal
  name: reinforced plastitanium wall
  suffix: reinforced, diagonal
  description: A diagonal plastitanium wall reinforced with an additional structural lattice, doubling its resistance to damage.
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
        - !type:SpawnEntitiesBehavior
          spawn:
            Girder:
              min: 1
              max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalSlam

# Reinforced Shuttle Walls (1.5x HP)
#   WallShuttleDiagonal: destroy 600→900, girder 300→450
#   WallShuttle:         destroy 600→900, girder 400→600

- type: entity
  parent: WallShuttleDiagonal
  id: WallReinforcedShuttleDiagonal
  name: reinforced shuttle wall
  suffix: reinforced, diagonal
  description: A diagonal shuttle wall with extra bracing, making it significantly harder to breach.
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 900
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: WallShuttle
  id: WallReinforcedShuttle
  name: reinforced shuttle wall
  suffix: reinforced
  description: A shuttle wall with extra bracing, making it significantly harder to breach.
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 900
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:DoActsBehavior
        acts: ["Destruction"]
# Starlight end

### WALL FAN
- type: entity
  parent: BaseWallmountMetallic
  id: WallFan
  name: wall fan
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Rotatable
  - type: WallMount
    arc: 360
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Sprite
    sprite: _Starlight/Structures/wall_fan.rsi
    state: wall_fan
    snapCardinals: true
    drawdepth: WallMountedItems
  - type: Transform
    anchored: true
  - type: Tag
    tags:
      - ForceFixRotations
      - Window
  - type: Icon
    sprite: _Starlight/Structures/wall_fan.rsi
    state: wall_fan
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 250
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Airtight
  - type: StaticPrice
    price: 75
  - type: RadiationBlocker
    resistance: 1
  - type: BlockWeather
  - type: Ricochetable
    chance: 0.4
