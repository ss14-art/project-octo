- type: entity
  id: SurgicalKitMedical
  parent: [ BaseSurgicalKit, BaseMedicalContraband ]
  name: surgical kit
  suffix: Medical
  description: A compact kit of surgical tools.

- type: entity
  name: surgical kit
  suffix: Medical, Filled
  parent: SurgicalKitMedical
  id: SurgicalKitMedicalFilled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: Hemostat
        - id: Saw
        - id: Drill
        - id: Cautery
        - id: Retractor
        - id: Scalpel
        - id: BoneGel
        - id: BoneSetter
