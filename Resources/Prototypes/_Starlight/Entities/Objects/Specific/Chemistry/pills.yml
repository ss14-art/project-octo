    pillType: 7
  - type: Sprite
    state: pill8
  - type: Label
    currentLabel: reagent-label-hydrogen-5
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Hydrogen
          Quantity: 5

- type: entity
