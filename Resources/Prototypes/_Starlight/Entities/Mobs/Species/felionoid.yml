- type: entity
  parent: [BaseMobSpeciesOrganic, BaseSpeciesPickupable, BaseInventoryFelionoid]
  id: BaseMobFelionoid
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Nekomimetic
    understands:
    - GalacticCommon
    - Nekomimetic
    - Cat
  - type: Absorbable
  - type: Speech
    speechVerb: Felionoid
    allowedEmotes: ['Mew', 'Hisses', 'Meow', 'Growl', 'Purr', 'Trill']
  - type: Vocal
    sounds:
      Male: MaleFelionoid
      Female: FemaleFelionoid
      Unsexed: MaleFelionoid
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: _Starlight/Mobs/Species/Felionoid/parts.rsi
    state: felionoid
  - type: Body
    prototype: Felionoid
    requiredLegs: 2
  - type:  HumanoidAppearance
    species: Felionoid
  - type: OwOAccent
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      170: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      51: 0.7 # 60%
      68: 0.5 # 80%
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 3
  - type: Damageable
    damageContainer: Biological
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    attackRate: 2
    damage:
      types:
        Slash: 3
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
      Acidic: [ Touch, Ingestion ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
      - !type:Emote
        emote: Hisses
        showInChat: false
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Felionoid
    - NotLabelable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.30
        density: 110
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Wagging
