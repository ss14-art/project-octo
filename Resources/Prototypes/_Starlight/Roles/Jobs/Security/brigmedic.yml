- type: job
  id: Brigmedic
  name: job-name-brigmedic
  description: job-description-brigmedic
  playTimeTracker: JobBrigmedic
  requirements:
    - !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 36000 # 10 hrs
    - !type:RoleTimeRequirement
      role: JobParamedic
      time: 5h
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 15h # You'll realistically clear this if you clear the chem requirements. Brigmed is being changed to be more-paramedical anyways, so this works with that. Chem time should be removed later on.
  startingGear: BrigmedicGear
  icon: "JobIconBrigmedic"
  supervisors: job-supervisors-hos
  canBeAntag: false
  access:
  - Security
  - Brig
  - Maintenance
  - Service
  - Medical
  - External
  - Cryogenics
  - Brigmedic
  - Paramedic
  - Surgery # Starlight
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]

- type: startingGear
  id: BrigmedicGear
  equipment:
    ears: ClothingHeadsetBrigmedic
    # neck: ClothingNeckTieRed # Tie variety
    pocket2: HandheldBrigmedicCrewMonitor
    # mask: ClothingMaskBreathMedicalSecurity # Mask variety
    # id: BrigmedicPDA # No longer needed with veteran PDA.
  storage:
    back:
    - Flash
    - SecurityMedkit
    - DefibrillatorBrigmedical
    belt:
    - TacticalJetInjector
    - BodyBagLockableFolded

- type: chameleonOutfit
  id: BrigmedicChameleonOutfit
  job: Brigmedic
  equipment:
    mask: ClothingMaskBreathMedicalSecurity
    neck: ClothingNeckTieRed
