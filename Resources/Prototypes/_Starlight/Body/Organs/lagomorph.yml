- type: entity
  id: OrganLagomorphEyes
  parent: OrganHumanEyes
  name: eyes
  suffix: Lagomorph
  description: "Couldn't have seen that one coming."
  components:
  - type: OrganVisualization
    layer: Eyes
    prototypes:
      Default: MobLagomorphEyes

- type: entity
  id: OrganLagomorphStomach
  parent: [OrganAnimalStomach, BaseOrganStomach]
  name: stomach
  description: "Gross. This is hard to stomach."
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Metabolizer
    updateInterval: 0.7

- type: entity
  id: OrganLagomorphHeart
  parent: OrganAnimalHeart
  name: heart
  description: "Gross. This is hard to stomach."
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    state: heart-on
  - type: Item
    size: Small
    heldPrefix: heart
  - type: Metabolizer
    updateInterval: 0.7
