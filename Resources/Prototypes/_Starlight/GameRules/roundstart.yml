# event schedulers

- type: entityTable
  id: BasicGameRulesTableNoRoundenders
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: BasicAntagEventsTableNoRoundenders
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
      - !type:NestedSelector
        tableId: SpicyPestEventsTable

- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleNoChangelings
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 0.60 # Starlight. Adds up to 1.
    - id: VampireLess # Starlight. The rework is here.
      prob: 0.25
    - id: SubWizard
      prob: 0.07 # Starlight. Wizard is incredibly rare. There are players with 1k hours that have never rolled it.
    - id: Xenoborgs
      prob: 0.08 # Starlight. To account for their secret mode being lowered.
    - id: Brighteye
      prob: 0.07
    - id: SiliconLiberation
      prob: 0.2

- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleLessThieves
  components:
  - type: SubGamemodes
    rules:
    - id: ThiefLess # So that only 3 thieves max spawn in rev games.
      prob: 0.41 # Starlight
    - id: SLChangeling #Starlight lings
      prob: 0.22
    - id: VampireLess # Starlight reworked
      prob: 0.22
    - id: SubWizard
      prob: 0.07 # Starlight. Wizard is incredibly rare. There are players with 1k hours that have never rolled it.
    - id: Xenoborgs
      prob: 0.08 # Starlight. To account for their secret mode being lowered.
    - id: Brighteye
      prob: 0.07

- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleNoVampires
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 0.60 # Same as NoChangelings
    - id: SLChangeling #Starlight lings
      prob: 0.25 # To be equal to the chance Vampires spawn in Changeling.
    - id: SubWizard
      prob: 0.07 # Starlight. Wizard is incredibly rare. There are players with 1k hours that have never rolled it.
    - id: Xenoborgs
      prob: 0.08 # Starlight. To account for their secret mode being lowered.
    - id: Brighteye
      prob: 0.07

- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleVampTraitorLing
  components:
  - type: SubGamemodes
    rules:
    - id: ThiefLess # So that only 3 thieves max spawn in rev games.
      prob: 0.85 # Starlight, to account for Wizard and Xenoborgs
    - id: SubWizard
      prob: 0.07 # Starlight. Wizard is incredibly rare. There are players with 1k hours that have never rolled it.
    - id: Xenoborgs
      prob: 0.08 # Starlight. To account for their secret mode being lowered.
    - id: Brighteye
      prob: 0.07

- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleZombieCompliantAntags
  components:
  - type: SubGamemodes
    rules:
    - id: ThiefLess
      prob: 0.50
    - id: SubTraitor # Special traitors with a curated set of objectives; they do not have Kill/Lesson/DAGD, and scale a lot less.
      prob: 0.20
    - id: VampireLess # This is probably the most interesting sub-gamemode for them.
      prob: 0.25
    - id: SLChangelingLess # I have managed to make changelings lose their abilities when they turn into zombies, so the concern with them is gone.
      prob: 0.25
    - id: Xenoborgs # I think there's interesting roleplay opportunity if Xenoborgs spawn. You could willingly choose to get borged to prevent infection. I want to see how this plays out.
      prob: 0.08
    - id: Brighteye
      prob: 0.07

- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleNuclearOperativeScaling
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 0.50
    - id: SLChangelingLess # 6 changelings makes it too hard to arm crew on warops
      prob: 0.20
    - id: VampireLess
      prob: 0.20
    - id: SubWizard
      prob: 0.07
    - id: Xenoborgs
      prob: 0.08

- type: entity
  parent: BaseGameRule
  id: ThiefGamerule
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 1

- type: entity
  parent: BaseGameRule
  id: SiliconLiberationGamerule
  components:
  - type: SubGamemodes
    rules:
    - id: SiliconLiberation
      prob: 1

- type: entity
  parent: Traitor
  id: TraitorLess
  components:
  - type: GameRule
    minPlayers: 5
    delay:
      min: 240
      max: 420
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Traitor ]
      max: 12 # Starlight. For VampTraitorLing.
      playerRatio: 17 # Starlight. For VampTraitorLing.
      blacklist:
        components:
        - AntagImmune
      lateJoinAdditional: false
      mindRoles:
      - MindRoleTraitor
