# Syndicate dead drop
- type: entity
  parent: BaseGameRule
  id: SyndicateDeadDrop
  components:
  - type: StationEvent
    startAnnouncement: station-syndicate-dead-drop-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    earliestStart: 15
    duration: 1
    minimumPlayers: 10
    maxOccurrences: 2
    weight: 10
  - type: RandomSpawnRule
    prototype: SyndieDeadDropSpawner
    radioMessage: {channel: Syndicate, message: "syndicate-dead-drop-announcement"}

# Shitstation
- type: entityTable
  id: ShitEventsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: BreakerFlip
    - id: CockroachMigration
    - id: MoproachMigration # They can clean. This is the lucky pull of this pool.
    - id: MouseMigration
    - id: GasLeak
    - id: KudzuGrowth
    - id: PowerGridCheck
    - id: VentClog
    - id: IonStormPlus # I think it's funny to have the double chance to get this.

- type: entity
  parent: BaseGameRule
  id: IonStormPlus # It's a more frequent Ion Storm, for ShitStation.
  components:
  - type: StationEvent
    globalAnnouncement: false # Starlight
    weight: 10
    reoccurrenceDelay: 15
    duration: 1
  - type: IonStormRule

# Terror Spiders

- type: entity
  id: TerrorSpidersSpawn
  parent: BaseGameRule
  components:
  - type: StationEvent
    globalAnnouncement: false
