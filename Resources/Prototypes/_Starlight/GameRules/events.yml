- type: entity
  parent: BaseGameRule
  id: AbductorsSpawn
  components:
    - type: StationEvent
      earliestStart: 15
      weight: 3
      minimumPlayers: 10
      duration: null
    - type: RuleGrids
    - type: LoadMapRule
      gridPath: /Maps/_Starlight/Shuttles/ShuttleEvent/abductor_shuttle.yml
    - type: AntagObjectives
      objectives:
        - AbductObjective
    - type: AntagLoadProfileRule
      speciesHardOverride: Abductor
    - type: AntagSelection
      definitions:
        - spawnerPrototype: AbductorScientistSpawner
          min: 1
          max: 2
          playerRatio: 90 # The Scientist is more important than the Agent, but also can't do anything without them, so...
          pickPlayer: false
          startingGear: AbductorScientistGear
          briefing:
            text: abductor-role-greeting
            color: Green
            sound: /Audio/_Starlight/Misc/abductor.ogg
          components:
            - type: Abductor
            - type: Muted
            - type: AbductorScientist
            - type: ActionGrant
              actions:
                - ActionReturnToShip
            - type: Tag
              tags:
                - Abductor
                - AbductorScientist
                - CanPilot
            - type: NpcFactionMember
              factions:
                - Abductor
          mindRoles:
            - MindRoleLoneAbductor
          # Starlight-start
          tags:
            - CantBecomeRevolutionary
          # Starlight-end
        - spawnerPrototype: AbductorAgentSpawner
          min: 1
          max: 3
          playerRatio: 70 # Abductors are so weak man, throw them a bone.
          pickPlayer: false
          startingGear: AbductorAgentGear
          briefing:
            text: abductor-role-greeting
            color: Green
            sound: /Audio/_Starlight/Misc/abductor.ogg
          components:
            - type: Abductor
            - type: Muted
            - type: AbductorAgent
            - type: ActionGrant
              actions:
                - ActionReturnToShip
            - type: Tag
              tags:
                - Abductor
                - CanPilot
            - type: NpcFactionMember
              factions:
                - Abductor
          mindRoles:
            - MindRoleLoneAbductor
          # Starlight-start
          tags:
            - CantBecomeRevolutionary
          # Starlight-end

# Roundender-less events table for survival
- type: entityTable
  id: BasicAntagEventsTableNoRoundenders
  table:
    !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
      - id: ClosetSkeleton
      - id: DragonSpawn
      - id: KingRatMigration
      - id: NinjaSpawn
      - id: ParadoxCloneSpawn
      - id: RevenantSpawn
      - id: SleeperAgents
      #    - id: ZombieOutbreak
      - id: LoneOpsSpawn
      - !type:NestedSelector
        tableId: DerelictBorgEventTable
      - id: WizardSpawn
      - id: Xenoborgs
      # Starlight gamerules:
      - id: AbductorsSpawn
      - id: RailroadingTerminator
      - id: Brighteye

- type: entity
  parent: BaseGameRule
  id: DerelictBorgiSpawn
  components:
    - type: StationEvent
      globalAnnouncement: false # Starlight
      weight: 5
      earliestStart: 15
      reoccurrenceDelay: 20
      minimumPlayers: 4
      duration: null
    - type: SpaceSpawnRule
      spawnDistance: 0
    - type: AntagSpawner
      prototype: DerelictBorgiChassis
    - type: AntagSelection
      definitions:
        - spawnerPrototype: SpawnPointGhostDerelictBorgi
          min: 1
          max: 2
          playerRatio: 80 # They don't do much, they're just borgs. Doesn't mean we need 5 of them running around.
          pickPlayer: false

# Brighteye
- type: entity
  parent: BaseGameRule
  id: Brighteye
  components:
    - type: StationEvent
      weight: 1
      earliestStart: 10
      reoccurrenceDelay: 20
      minimumPlayers: 20
      duration: null
    - type: RuleGrids
    - type: GameRule
      minPlayers: 20
    - type: BrighteyeRule
    - type: LoadMapRule
      mapPath: /Maps/_Starlight/TheDark/Hideout.yml
      mapTag: TheDark
    - type: AntagLoadProfileRule
      speciesHardOverride: Shadekin
      applyCharacterProfile: true
    - type: AntagObjectives
      objectives:
        - BirghteyeSurviveObjective
        - BirghteyePortalObjective
    - type: AntagSelection
      agentName: roles-antag-brighteye-name
      selectionTime: PrePlayerSpawn
      definitions:
        - prefRoles: [Brighteye]
          min: 1
          max: 3
          playerRatio: 70 # Starlight. They don't do much, positive or negative. They pretty much are just RP currently.
          spawnerPrototype: SpawnPointGhostBrighteye
          roleLoadout:
            - AntagBrighteye
          briefing:
            text: brighteye-role-greeting
            color: "#F200FF"
            sound: "/Audio/_Starlight/Ambience/Antag/brighteye.ogg"
          components:
            - type: Brighteye
              energy: 200 # THIS IS HARDCODED BULLSHIT... i wish i could set this auto to MaxEnergy.
            - type: NpcFactionMember
              factions:
                - SimpleHostile
            - type: CombatMode
              disarmFailChance: 0.5
              canDisarm: true
            - type: Railroadable
              important: true
          mindRoles:
            - MindRoleBrighteye
          tags:
            - CantBecomeRevolutionary
    - type: SubGamemodes
      rules:
        - id: RailroadingBrighteye
    - type: DynamicRuleCost
      cost: 150

# This is used for admin/tools to spawn the dark without any antag.
- type: entity
  parent: BaseGameRule
  id: TheDarkMap
  components:
    - type: StationEvent
    - type: LoadMapRule
