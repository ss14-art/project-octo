- type: entity
  abstract: true
  parent: Clothing
  id: ClothingHeadset
  name: headset
  description: An updated, modular intercom that fits over the head. Takes encryption keys.
  components:
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
  - type: Headset
  - type: EncryptionKeyHolder
    keySlots: 4
  - type: Sprite
    state: icon
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - ears
    sprite: Clothing/Ears/Headsets/base.rsi
  - type: GuideHelp
    guides:
    - Radio
  # Starlight, channel muting
  - type: UserInterface
    interfaces:
      enum.EncryptionKeyHolderUiKey.Key:
        type: EncryptionKeyHolderBoundUserInterface
  - type: ActivatableUI
    inHandsOnly: false
    key: enum.EncryptionKeyHolderUiKey.Key
  # Starlight End
  # WL-Sounds-Start
  - type: EmitSoundOnPickup
    sound:
      collection: HeadsetPickup
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_WL/Items/handling/headset/headset_drop1.ogg
      params:
        volume: -4
  # WL-Sounds-End

