      pipe:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: TSouth
  - type: Sprite
    layers:
      - state: pipeTJunction
        map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: AtmosPipeLayers
    alternativePrototypes:
      Primary: GasPipeTJunction
      Secondary: GasPipeTJunctionAlt1
      Tertiary: GasPipeTJunctionAlt2
      # Carpmosia-start - 5 pipe layers
      Quaternary: GasPipeTJunctionAlt3
      Quinary: GasPipeTJunctionAlt4
      # Carpmosia-end - 5 pipe layers
  - type: Construction
    graph: GasPipe
    node: tjunction
  - type: Item
    heldPrefix: TJunction
    storedSprite:
      sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: storageTJunction
  - type: MeleeWeapon
    wideAnimationRotation: 90
    attackRate: 0.75
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud
  # Starlight start
  - type: VentCrawlTube
  - type: VentCrawlJunction
    degrees:
      - 0
      - 90
      - -90
  - type: ContainerContainer
    containers:
      VentCrawlTube: !type:Container
  # Starlight end
  - type: GuideHelp
    guides:
    - Pipes
    - PipeNetworks

