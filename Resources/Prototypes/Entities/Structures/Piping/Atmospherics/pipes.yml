- type: entity
  abstract: true
  parent: BaseItem
  id: GasPipeSansLayers
  name: gas pipe
  description: Holds gas.
  placement:
    mode: SnapgridCenter
  components:
  - type: Visibility
    layer: 1
  - type: Item
    size: Normal
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: SubFloorHide
  - type: CollideOnAnchor
  - type: Anchorable
  - type: Rotatable
  - type: Destructible
    thresholds:
    - trigger: # for nukes
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger: # regular damage trigger (replace with broken pipe)
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -8
      - !type:SpawnEntitiesBehavior
        spawn:
          GasPipeBroken:
            min: 1
            max: 1
        offset: 0
      - !type:DoActsBehavior
        acts: ["Breakage"]
  - type: Sprite
    sprite: _Carpmosia/Structures/Piping/Atmospherics/pipe.rsi
    drawdepth: ThinPipe
    visible: false
  - type: Appearance
  - type: PipeAppearance
  - type: PipeColorVisuals
  - type: NodeContainer
  - type: PipeRestrictOverlap
  - type: AtmosUnsafeUnanchor
  - type: AtmosPipeColor
  - type: AtmosMonitoringConsoleDevice
  - type: Tag
    tags:
    - Pipe
  - type: Physics
    canCollide: false
    bodyType: static
  - type: StaticPrice
    price: 30
  # Starlight start
  - type: ContainerContainer
    containers:
      VentCrawlTube: !type:Container
  # Starlight end
  - type: ChildBlockVision # Starlight-edit
  # Starlight Start: RPD
  - type: RCDDeconstructable
    cost: 1
    delay: 2
    fx: EffectRCDDeconstruct2
    rpd: true
  # Starlight End
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/wrench_pickup.ogg
      params:
        volume: -2
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/wrench_drop.ogg
      params:
        volume: -2
  - type: EmitSoundOnLand
    sound:
    # WL-Changes-start
    #  collection: PipeDrop
      path: /Audio/_Goobstation/Items/Pipe/metal_pipe_fall.ogg
      params:
        volume: -2
    # WL-Changes-end
  # Goobstation edit end

# Starlight start
- type: entity
  id: VentCrawlHolder
  categories: [ HideSpawnMenu ]
  name: vent craw holder
  components:
    - type: VentCrawlHolder
    - type: InputMover
    - type: ContainerContainer
      containers:
        VentCrawlHolderComponent: !type:Container
# Starlight end

- type: entity
  abstract: true
  parent: GasPipeSansLayers
  id: GasPipeBase
  components:
  - type: AtmosPipeLayers
    spriteLayersRsiPaths:
      enum.PipeVisualLayers.Pipe:
        # Carpmosia-start - 5 pipe layers
        Primary: _Carpmosia/Structures/Piping/Atmospherics/pipe.rsi
        Secondary: _Carpmosia/Structures/Piping/Atmospherics/pipe_alt1.rsi
        Tertiary: _Carpmosia/Structures/Piping/Atmospherics/pipe_alt2.rsi
        Quaternary: _Carpmosia/Structures/Piping/Atmospherics/pipe_alt3.rsi
        Quinary: _Carpmosia/Structures/Piping/Atmospherics/pipe_alt4.rsi
        # Carpmosia-end - 5 pipe layers

#Note: The PipeDirection of the PipeNode should be the south-facing version, because the entity starts at an angle of 0 (south)

- type: entity
  parent: GasPipeBase
  id: GasPipeHalf
  suffix: Half
  placement:
    mode: AlignAtmosPipeLayers
  components:
  - type: NodeContainer
    nodes:
      pipe:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
  - type: Sprite
    layers:
    - state: pipeHalf
      map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: AtmosPipeLayers
    alternativePrototypes:
      Primary: GasPipeHalf
      Secondary: GasPipeHalfAlt1
      Tertiary: GasPipeHalfAlt2
      # Carpmosia-start - 5 pipe layers
      Quaternary: GasPipeHalfAlt3
      Quinary: GasPipeHalfAlt4
      # Carpmosia-end - 5 pipe layers
  - type: Construction
    graph: GasPipe
    node: half
  - type: Item
    size: Small
    storedSprite:
      sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: storageHalf
  - type: GuideHelp
    guides:
    - Pipes
    - PipeNetworks

- type: entity
  parent: GasPipeBase
  id: GasPipeStraight
  suffix: Straight
  placement:
    mode: AlignAtmosPipeLayers
  components:
  - type: NodeContainer
    nodes:
      pipe:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: Longitudinal
  # Starlight start
  - type: VentCrawlTube
  - type: VentCrawlTransit
  - type: ContainerContainer
    containers:
      VentCrawlTube: !type:Container
  # Starlight end
  - type: Sprite
    layers:
    - state: pipeStraight
      map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: AtmosPipeLayers
    alternativePrototypes:
      Primary: GasPipeStraight
      Secondary: GasPipeStraightAlt1
      Tertiary: GasPipeStraightAlt2
      # Carpmosia-start - 5 pipe layers
      Quaternary: GasPipeStraightAlt3
      Quinary: GasPipeStraightAlt4
      # Carpmosia-end - 5 pipe layers
  - type: Construction
    graph: GasPipe
    node: straight
  - type: Item
    storedSprite:
      sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: storageStraight
    shape:
    - 0,0,0,2
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud # this NEEDS to changed to the metal pipe falling sound effect on april first every year
  - type: GuideHelp
    guides:
    - Pipes
    - PipeNetworks

- type: entity
  parent: GasPipeBase
  id: GasPipeBend
  suffix: Bend
  placement:
    mode: AlignAtmosPipeLayers
  components:
  - type: NodeContainer
    nodes:
      pipe:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: SWBend
  # Starlight start
  - type: VentCrawlTube
  - type: VentCrawlBend
  - type: ContainerContainer
    containers:
      VentCrawlTube: !type:Container
  # Starlight end
  - type: Sprite
    layers:
      - state: pipeBend
        map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: AtmosPipeLayers
    alternativePrototypes:
      Primary: GasPipeBend
      Secondary: GasPipeBendAlt1
      Tertiary: GasPipeBendAlt2
      # Carpmosia-start - 5 pipe layers
      Quaternary: GasPipeBendAlt3
      Quinary: GasPipeBendAlt4
      # Carpmosia-end - 5 pipe layers
  - type: Construction
    graph: GasPipe
    node: bend
  - type: Item
    shape:
    - 0,0,1,0
    - 1,1,1,1
    heldPrefix: Bend
    storedSprite:
      sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: storageBend
  - type: MeleeWeapon
    wideAnimationRotation: 180
    attackRate: 1
    damage:
      types:
        Blunt: 6
    soundHit:
      collection: MetalThud
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 8 # Woe, pipe be upon ye!
  - type: GuideHelp
    guides:
    - Pipes
    - PipeNetworks

- type: entity
  parent: GasPipeBase
  id: GasPipeTJunction
  placement:
    mode: AlignAtmosPipeLayers
  suffix: TJunction
  components:
  - type: NodeContainer
