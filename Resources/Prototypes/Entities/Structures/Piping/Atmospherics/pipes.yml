- type: entity
  id: GasPipeBroken
  parent: GasPipeBase
  name: broken pipe
  description: It used to hold gas.
  components:
  - type: Sprite
    sprite: _Carpmosia/Structures/Piping/Atmospherics/pipe.rsi
    drawdepth: ThinPipe
    state: pipeBroken
    layers:
      - state: pipeBroken
        map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: AtmosPipeLayers
    numberOfPipeLayers: 1
  - type: Construction
    graph: GasPipe
    node: broken
  - type: Item
    size: Small
  - type: Destructible
    thresholds: # override parent to avoid recursive destruction
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: GuideHelp
    guides:
    - Pipes
    - PipeNetworks

- type: entity
  parent: GasPipeSansLayers
  id: GasPipeManifold
  name: gas pipe manifold
  description: Allows gas pipes of different configurations to be connected together.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi # Carpmosia-edit - 5 pipe layers
    layers:
    - state: pipeManifold
      map: [ "enum.PipeVisualLayers.Pipe" ]
  - type: AtmosPipeLayers
    pipeLayersLocked: true
  - type: PipeAppearance
    sprite:
    # Carpmosia-start - 5 pipe layers
    - { sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi, state: pipeConnector }
    - { sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi, state: pipeConnector_alt1 }
    - { sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi, state: pipeConnector_alt2 }
    - { sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi, state: pipeConnector_alt3 }
    - { sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi, state: pipeConnector_alt4 }
    # Carpmosia-end - 5 pipe layers
  - type: Construction
    graph: GasPipe
    node: manifold
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    storedSprite:
      sprite: _Carpmosia/Structures/Piping/Atmospherics/manifold.rsi # Carpmosia-edit - 5 pipe layers
      state: storageManifold
  - type: NodeContainer
    nodes:
      south0:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        pipeLayer: 0
        volume: 50
      south1:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        pipeLayer: 1
        volume: 50
      south2:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        pipeLayer: 2
        volume: 50
      # Carpmosia-start - 5 pipe layers
      south3:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        pipeLayer: 3
      south4:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        pipeLayer: 4
      # Carpmosia-end - 5 pipe layers
      north0:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: North
        pipeLayer: 0
        volume: 50
      north1:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: North
        pipeLayer: 1
        volume: 50
      north2:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: North
        pipeLayer: 2
        volume: 50
      # Carpmosia-start - 5 pipe layers
      north3:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: North
        pipeLayer: 3
      north4:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: North
        pipeLayer: 4
      # Carpmosia-end - 5 pipe layers
  - type: GasPipeManifold
  - type: AtmosMonitoringConsoleDevice
    navMapBlip: GasPipeManifold
    showAbsentConnections: false
  - type: AtmosDevice
