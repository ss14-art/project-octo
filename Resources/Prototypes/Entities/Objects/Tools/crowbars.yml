# Abductor's Crowbar
- type: entity
  parent: BaseCrowbar
  id: CrowbarAbductor
  name: abductor's crowbar
  description: A multipurpose tool to pry open doors and fight interdimensional invaders.
  components:
  - type: Sprite
    state: abductor
  - type: Item
    storedSprite:
      sprite: Objects/Tools/crowbar.rsi
      state: abductor
  - type: Tool
    speedModifier: 2
    qualities:
      - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
