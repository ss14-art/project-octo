- type: entity
  abstract: true
  parent: BaseItem
  id: BaseCrowbar
  name: crowbar
  description: A multipurpose tool used for many tasks, such as prying doors or bludgeoning interdimensional invaders.
  components:
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/crowbar_pickup.ogg
      params:
        volume: -2
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -2
  # Goobstation edit end
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/crowbar_drop.ogg
  - type: Tag
    tags:
    - Crowbar
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud
  - type: Tool
    qualities:
      - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: ToolTileCompatible
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: StaticPrice
    price: 22
  - type: Prying
    useSoundOnDoafter: /Audio/_Starlight/Machines/airlock_pry.ogg #SL
    playSoundOnDoafter: true #SL
  - type: Sprite
    sprite: Objects/Tools/crowbar.rsi
  - type: Clothing
    sprite: Objects/Tools/crowbar.rsi
    quickEquip: false
    slots:
    - Belt
  - type: Item
    sprite: Objects/Tools/crowbar.rsi
    size: Normal
    shape:
    - 0,0,0,1
  # 🌟Starlight-start🌟
  - type: SurgeryTool
  - type: BoneSetter
    successRate: 0.4
    speed: 1.5
    startSound:
      path: /Audio/_Starlight/Medical/Surgery/bone_setter.ogg
  - type: CrowbarSurgery
    startSound:
      path: /Audio/Items/crowbar.ogg
  # 🌟Starlight-end🌟

# Standard (grey) Crowbar
- type: entity
  parent: BaseCrowbar
  id: Crowbar
  components:
  - type: Sprite
    state: icon
  - type: Item
    storedSprite:
      sprite: Objects/Tools/crowbar.rsi
      state: storage

# Emergency (red) Crowbar
- type: entity
  parent: BaseCrowbar
  id: CrowbarRed
  components:
  - type: Tag
    tags:
    - Crowbar
    - CrowbarRed
  - type: Sprite
    layers:
    - state: icon
    - state: cover-icon
      color: "#990000"
  - type: Item
    storedSprite:
      state: red-storage
      sprite: Objects/Tools/crowbar.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - state: cover-inhand-left
        color: "#990000"
      right:
      - state: inhand-right
      - state: cover-inhand-right
        color: "#990000"
  - type: Clothing
    clothingVisuals:
      belt:
      - state: equipped-BELT
      - state: cover-equipped-BELT
        color: "#990000"

