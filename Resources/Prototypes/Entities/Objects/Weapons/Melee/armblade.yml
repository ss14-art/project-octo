- type: entity
  name: arm blade
  parent: BaseItem
  id: ArmBlade
  description: A grotesque blade made out of bone and flesh that can pry open doors and cleaves through people as a hot knife through butter.
  components:
  - type: Sharp
  - type: Sprite
    sprite: Changeling/arm_blade.rsi # Starlight new changeling armblade sprites
    state: icon
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    wideAnimationRotation: 90
    attackRate: 1.2 # Starlight, we can make it swing a little faster. It's just your arm, you've got good control over that. It also instantly makes you a target.
    damage:
      types: # Same as energy sword, but slash/pierce instead of slash/heat
        Slash: 15
        Piercing: 15
        Structural: 20
  - type: Item
    size: Normal
    sprite: Changeling/arm_blade.rsi
  - type: Prying
    speedModifier: 2 # Starlight, faster than the Jaws of life, so you can hunt people down.
    pryPowered: true
    useSoundOnDoafter: /Audio/_Starlight/Machines/airlock_pry.ogg #SL
    playSoundOnDoafter: true #SL
