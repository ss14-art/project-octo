- type: entity
  id: BaseStockPart
  name: stock part
  parent: BaseItem
  description: What?
  abstract: true
  components:
    # Goobstation edit start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_Goobstation/Items/handling/component_pickup.ogg
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/_Goobstation/Items/handling/component_drop.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/_Goobstation/Items/handling/component_drop.ogg
    # Goobstation edit end
    - type: Sprite
      sprite: Objects/Misc/stock_parts.rsi
    - type: Item
      size: Tiny
    # Starlight start
    - type: UserInterface
      interfaces:
        enum.StackCustomSplitUiKey.Key:
          type: StackCustomSplitBoundUserInterface
    # Starlight end
    - type: Tag
      tags:
      - ConstructionMaterial

- type: entity
  id: MicroManipulatorStockPart
  name: modular machine part
  parent: BaseStockPart
  description: A basic machine part used in the construction of a variety of devices.
  suffix: Rating 1
  components:
    - type: Sprite
      state: micro_mani
    - type: Stack
      stackType: Manipulator
    - type: Tag
      tags:
      - MicroManipulatorStockPart
    # 🌟Starlight-start🌟
    - type: ItemPrice
      priceCategory: tool_cheap
    - type: SurgeryTool
    - type: Hemostat
      successRate: 0.3 # These are crude but, can grab things
      speed: 1.5
      startSound:
        path: /Audio/_Starlight/Medical/Surgery/hemostat1.ogg
    # 🌟Starlight-end🌟
